<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detective Game</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      overflow: hidden;
    }

    /* palco responsivo */
    #sceneWrapper {
      width: min(800px, 100vw, calc(100vh * 800 / 500));
      aspect-ratio: 800 / 500;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    /* cena lógica fixa em 800x500 */
    #sceneParalax {
      position: absolute;
      top: 0;
      left: 0;
      width: 800px;
      height: 500px;
      transform-origin: top left;
      overflow: hidden;
      background: #000;
    }

    #fadeOverlay {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 1;
      z-index: 50;
      pointer-events: none;
    }

    #bg1,
    #bg2 {
      position: absolute;
      top: 0;
      height: 500px;
      width: 2667px;
      max-width: none;
      z-index: 1;
      pointer-events: none;
      user-select: none;
    }

    #chuva {
      position: absolute;
      inset: 0;
      width: 800px;
      height: 500px;
      object-fit: cover;
      z-index: 5;
      pointer-events: none;
      user-select: none;
    }

    #fuscaAnimado {
      position: absolute;
      z-index: 30;
      background-image: url("assets/fuscaAnimado.png");
      background-repeat: no-repeat;
      background-position: 0 0;
      pointer-events: none;
    }

    #modal-container {
      display: none;
	  position: absolute;
	  top: 50px;
	  left: 50%;
	  height: 120px;
	  background-color: rgba(0, 0, 0, 0.7);
	  color: black;
	  border-radius: 5px;
	  border: 2px solid white;
	  overflow-y: auto;
	  font-size: 16px;
	  align-items: center;
	  z-index: 900;
	  box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
	  font-family: 'Share Tech Mono', monospace;
	  font-size: 16px; 
	  }

    #modal-img {
      width: 80px;
      height: 80px;
      margin-right: 20px;
      float: left;
      display: none;
      object-fit: cover;
    }

    #modal-name {
      font-size: 18px;
      margin-bottom: 8px;
      text-shadow: 1px 1px 0 #000;
	  font-weight: bold;
    }

    #modal-text {
      margin-top: 10px;
      font-size: 15px;
      line-height: 1.4;
      white-space: pre-line;
      text-shadow: 1px 1px 0 #000;
    }

    #sceneTitle {
      display: none;
    }
  </style>
</head>
<body>

  <div id="sceneWrapper">
    <div id="sceneParalax">
      <div id="modal-container">
        <img id="modal-img" src="" alt="">
        <div id="modal-name"></div>
        <div id="modal-text"></div>
      </div>

      <div id="fadeOverlay"></div>
      <img id="bg1" src="assets/fundoParalax.jpg" alt="">
      <img id="bg2" src="assets/fundoParalax.jpg" alt="">
      <div id="fuscaAnimado"></div>
      <img id="chuva" src="assets/rain2.gif" alt="">
    </div>
  </div>

  <script>
    function ajustarEscalaCena() {
      const wrapper = document.getElementById("sceneWrapper");
      const scene = document.getElementById("sceneParalax");

      const larguraBase = 800;
      const alturaBase = 500;

      const escalaX = wrapper.clientWidth / larguraBase;
      const escalaY = wrapper.clientHeight / alturaBase;
      const escala = Math.min(escalaX, escalaY);

      scene.style.transform = `scale(${escala})`;
    }

    function iniciarParallax() {
      const bg1 = document.getElementById("bg1");
      const bg2 = document.getElementById("bg2");

      const larguraFundo = 2667;
      const velocidade = 2;

      let x1 = 0;
      let x2 = -larguraFundo;

      function animar() {
        x1 += velocidade;
        x2 += velocidade;

        if (x1 >= larguraFundo) {
          x1 = x2 - larguraFundo;
        }

        if (x2 >= larguraFundo) {
          x2 = x1 - larguraFundo;
        }

        bg1.style.left = `${x1}px`;
        bg2.style.left = `${x2}px`;

        requestAnimationFrame(animar);
      }

      animar();
    }

    let intervaloFusca = null;
    let dialogoAtivo = false;

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function iniciarAnimacaoSpriteFusca() {
      const fusca = document.getElementById("fuscaAnimado");

      const frameWidth = 334;
      const frameHeight = 168;
      const totalFrames = 10;
      const frameDuration = 100;
      const escala = 1;

      let frameAtual = 0;

      fusca.style.width = `${frameWidth * escala}px`;
      fusca.style.height = `${frameHeight * escala}px`;
      fusca.style.backgroundSize = `${frameWidth * totalFrames * escala}px ${frameHeight * escala}px`;

      pararAnimacaoSpriteFusca();

      function atualizarFrame() {
        const posX = -(frameAtual * frameWidth * escala);
        fusca.style.backgroundPosition = `${posX}px 0px`;
        frameAtual = (frameAtual + 1) % totalFrames;
      }

      atualizarFrame();
      intervaloFusca = setInterval(atualizarFrame, frameDuration);
    }

    function pararAnimacaoSpriteFusca() {
      if (intervaloFusca !== null) {
        clearInterval(intervaloFusca);
        intervaloFusca = null;
      }
    }

    function fadeInCena(duracao = 1500) {
      return new Promise(resolve => {
        const fade = document.getElementById("fadeOverlay");
        let inicio = null;

        function animar(timestamp) {
          if (!inicio) inicio = timestamp;
          const progresso = Math.min((timestamp - inicio) / duracao, 1);

          fade.style.opacity = 1 - progresso;

          if (progresso < 1) {
            requestAnimationFrame(animar);
          } else {
            fade.style.opacity = 0;
            resolve();
          }
        }

        fade.style.opacity = 1;
        requestAnimationFrame(animar);
      });
    }

    function fadeOutCena(duracao = 1000) {
      return new Promise(resolve => {
        const fade = document.getElementById("fadeOverlay");
        let inicio = null;

        function animar(timestamp) {
          if (!inicio) inicio = timestamp;
          const progresso = Math.min((timestamp - inicio) / duracao, 1);

          fade.style.opacity = progresso;

          if (progresso < 1) {
            requestAnimationFrame(animar);
          } else {
            resolve();
          }
        }

        requestAnimationFrame(animar);
      });
    }

    function falarSequencial(
      listaFalas,
      nome = "Inspetor Zanko",
      imagem = "assets/zankoPH.png",
      cor = "rgb(255,200,150)"
    ) {
      return new Promise(resolve => {
        const modal = document.getElementById("modal-container");
        const modalImg = document.getElementById("modal-img");
        const modalName = document.getElementById("modal-name");
        const modalText = document.getElementById("modal-text");

        let indice = 0;
        dialogoAtivo = true;

        function renderizar() {
          modalName.innerText = nome;
          modalText.innerText = listaFalas[indice];
          modalName.style.color = cor;
          modalText.style.color = cor;
          modalImg.src = imagem;
          modalImg.style.display = "block";
          modal.style.display = "block";
        }

        function avancar() {
          if (!dialogoAtivo) return;

          indice++;

          if (indice >= listaFalas.length) {
            dialogoAtivo = false;
            modal.style.display = "none";
            document.removeEventListener("pointerdown", avancar);
            resolve();
            return;
          }

          renderizar();
        }

        renderizar();

        setTimeout(() => {
          document.addEventListener("pointerdown", avancar);
        }, 200);
      });
    }

    function moverFuscaComAceleracao({
      xInicial,
      xFinal,
      top = 290,
      velocidadeInicial = 2,
      velocidadeMaxima = 10,
      aceleracao = 0.15,
      desacelerarNoFinal = false
    }) {
      return new Promise(resolve => {
        const fusca = document.getElementById("fuscaAnimado");

        let x = xInicial;
        let velocidade = velocidadeInicial;

        fusca.style.top = `${top}px`;
        fusca.style.left = `${Math.round(x)}px`;

        function animar() {
          const distanciaRestante = xFinal - x;

          if (desacelerarNoFinal) {
            const distanciaAbs = Math.abs(distanciaRestante);

            if (distanciaAbs < 250) {
              velocidade = Math.max(1.2, velocidade * 0.97);
            } else {
              velocidade = Math.min(velocidade + aceleracao, velocidadeMaxima);
            }
          } else {
            velocidade = Math.min(velocidade + aceleracao, velocidadeMaxima);
          }

          if (x < xFinal) {
            x += velocidade;
            if (x >= xFinal) x = xFinal;
          } else {
            x -= velocidade;
            if (x <= xFinal) x = xFinal;
          }

          fusca.style.left = `${Math.round(x)}px`;

          if (x === xFinal) {
            resolve();
            return;
          }

          requestAnimationFrame(animar);
        }

        requestAnimationFrame(animar);
      });
    }

    async function cenaFuscaZanko() {
      ajustarEscalaCena();
      iniciarParallax();

      const fusca = document.getElementById("fuscaAnimado");

      const larguraTela = 800;
      const larguraFusca = 334;
      const centroX = Math.round(larguraTela / 2);

      const foraDireita = larguraTela + larguraFusca;
      const foraEsquerda = -larguraFusca - 20;

      iniciarAnimacaoSpriteFusca();

      fusca.style.left = `${foraDireita}px`;
      fusca.style.top = "290px";

      await fadeInCena(1500);

      await moverFuscaComAceleracao({
        xInicial: foraDireita,
        xFinal: centroX,
        top: 290,
        velocidadeInicial: 1.5,
        velocidadeMaxima: 7,
        aceleracao: 0.10,
        desacelerarNoFinal: true
      });

      await falarSequencial([
        "Já é noite em Rio Grande.",
        "Mas quando um figurão chama a polícia, a gente responde.",
        "Esse é um dos meus primeiros casos. \nEu preciso provar o meu valor."
      ]);

      await moverFuscaComAceleracao({
        xInicial: centroX,
        xFinal: foraEsquerda,
        top: 290,
        velocidadeInicial: 2,
        velocidadeMaxima: 10,
        aceleracao: 0.15,
        desacelerarNoFinal: false
      });

      await fadeOutCena(1000);

      window.location.href = "game.html";
    }

    window.addEventListener("load", () => {
      ajustarEscalaCena();
      cenaFuscaZanko();
    });

    window.addEventListener("resize", ajustarEscalaCena);
  </script>
</body>
</html>
