<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detective Game</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

</head>
<body>
<h2 id="sceneTitle"></h2>
  <div id="scene-transition"></div>
  <div id="game-container">
    <!-- Inventário (topo esquerdo) -->
    <div id="inventory">
    </div>
    <div id="scene"></div>


    <!-- Pistas (topo direito) -->
    <div id="clues-icon">
		<button id="clues-button" class="clues-btn"></button>
		<button id="save-button" class="save-btn"></button>
	</div>

    <!-- Modal de conversa / descrição -->
	<div id="modal-container">
		<img id="modal-img" src="" alt="" style="width: 80px; height: 80px; margin-right: 20px; float: left; display: none;">
		<div id="modal-name"></div> <!-- novo elemento para o nome -->
		<div id="modal-text" style="margin-top:10px;"></div>
	</div>
    <!-- Cena principal -->
    
	<script src="script.js"></script>
	<script src="game.js"></script>
	
    <div id="clues-modal-container">
      <h2 id="clues-modal-title">Pistas</h2>
      <div id="clues-modal-list-container">
        <ul id="clues-modal-list"></ul>
      </div>
    </div>

<div id="save-modal-overlay">
  <div id="save-modal-container">
    <h2 id="save-modal-title">Salvar / Carregar</h2>

    <div id="save-modal-list-container">
      <div class="save-slot" data-slot="1">
        <div class="slot-left">
          <span class="slot-label">Slot 1</span>
          <span class="slot-status" id="slot-status-1">Vazio</span>
        </div>
        <div class="slot-actions">
          <button class="slot-action-btn save-action" data-slot="1">Salvar</button>
          <button class="slot-action-btn load-action" data-slot="1">Carregar</button>
        </div>
      </div>

      <div class="save-slot" data-slot="2">
        <div class="slot-left">
          <span class="slot-label">Slot 2</span>
          <span class="slot-status" id="slot-status-2">Vazio</span>
        </div>
        <div class="slot-actions">
          <button class="slot-action-btn save-action" data-slot="2">Salvar</button>
          <button class="slot-action-btn load-action" data-slot="2">Carregar</button>
        </div>
      </div>

      <div class="save-slot" data-slot="3">
        <div class="slot-left">
          <span class="slot-label">Slot 3</span>
          <span class="slot-status" id="slot-status-3">Vazio</span>
        </div>
        <div class="slot-actions">
          <button class="slot-action-btn save-action" data-slot="3">Salvar</button>
          <button class="slot-action-btn load-action" data-slot="3">Carregar</button>
        </div>
      </div>
    </div>

    <div id="save-modal-message"></div>
  </div>
</div>


</div>
<script>
window.addEventListener("load", () => {
  initSaveLoadUI();
  updateSaveSlotsUI();
});
</script>
</body>
</html>
