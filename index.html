<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detective Game</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
	body {
		margin: 0;
		min-height: 100vh;
		display: flex;
		justify-content: center;
		align-items: center;
		background: #000;
		overflow: hidden;
		}

    #sceneInicio {
		position: relative;
		width: min(100vw, calc(100vh * 800 / 500));
		aspect-ratio: 800 / 500;
		overflow: hidden;
		background: url("assets/fundoZanko.jpg") center center / cover no-repeat;
		cursor: pointer;
		}

    #sceneTitle {
		position: absolute;
		left: 31%;
		bottom: 3.8%;
		transform: translateX(-40%);
		margin: 0;
		z-index: 5;
		color: #f0d8b0;
		font-family: 'Share Tech Mono', monospace;
		font-size: clamp(12px, 2vw, 16px);
		font-weight: normal;
		letter-spacing: 2px;
		animation: piscar 1.2s infinite;
		pointer-events: none;
		text-shadow: 2px 2px 0 #000;
		display: none;
		}

    #fadeOverlay {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 1; 
      z-index: 10;
      pointer-events: none;
    }

    #chuva {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 2;
      pointer-events: none;
      display: none;
    }

    @keyframes piscar {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
  </style>
</head>
<body>
  <div id="sceneInicio">
    <h2 id="sceneTitle">Clique para iniciar...</h2>
    <div id="fadeOverlay"></div>
    <img id="chuva" src="assets/rain2.gif">
  </div>

  <script>
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
	
	function fadeOutCena(duracao = 1000) {
  return new Promise(resolve => {
    const fade = document.getElementById("fadeOverlay");
    let inicio = null;

    function animar(timestamp) {
      if (!inicio) inicio = timestamp;
      const progresso = Math.min((timestamp - inicio) / duracao, 1);

      fade.style.opacity = progresso;

      if (progresso < 1) {
        requestAnimationFrame(animar);
      } else {
        resolve();
      }
    }

    requestAnimationFrame(animar);
  });
}

    function fadeInCena(duracao = 1500) {
      return new Promise(resolve => {
        const fade = document.getElementById("fadeOverlay");
        let inicio = null;

        function animar(timestamp) {
          if (!inicio) inicio = timestamp;
          const progresso = Math.min((timestamp - inicio) / duracao, 1);

          fade.style.opacity = 1 - progresso;

          if (progresso < 1) {
            requestAnimationFrame(animar);
          } else {
            fade.style.opacity = 0;
            resolve();
          }
        }

        requestAnimationFrame(animar);
      });
    }

    async function iniciarTela() {
      const scene = document.getElementById("sceneInicio");
      const title = document.getElementById("sceneTitle");
      const chuva = document.getElementById("chuva");
      const fade = document.getElementById("fadeOverlay");

      const tempoTelaInicial = 3000;

	  // 🔥 FADE IN DO FUNDO ZANKO
	  await fadeInCena(1800);
      // mostra fundoZanko.jpg por 3 segundos
      await sleep(tempoTelaInicial);

	  // 🔥 FADE-OUT (escurece tudo)
      await fadeOutCena(1000);
      
	  // prepara o fade preto
      fade.style.opacity = 1;

      // troca o fundo
      scene.style.background = 'url("assets/fundoInicio.jpg") center center / cover no-repeat';
      chuva.style.display = "block";

      // faz o fade para revelar a segunda tela
      await fadeInCena(1500);

      title.style.display = "block";

      document.addEventListener("click", () => {
        window.location.href = "animacao.html";
      }, { once: true });
    }

    window.addEventListener("load", iniciarTela);
  </script>
</body>
</html>
